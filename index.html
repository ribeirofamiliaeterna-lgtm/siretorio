<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Painel de Gestão">
  <title>Painel de Gestão da Ala</title>
  <style>
    :root{
      --serif:'Palatino Linotype','Palatino','Book Antiqua','URW Palladio L',Georgia,serif;
      --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
      --papel:#FAF9F6;         /* fundo geral, branco quente */
      --branco:#FFFFFF;
      --tinta:#23282E;         /* texto principal */
      --tinta2:#5A6068;        /* texto secundário */
      --tinta3:#8A9099;        /* texto apagado */
      --linha:#E5E2DB;         /* bordas */
      --linha2:#EFEDE7;
      --azul:#16436B;          /* azul profundo institucional */
      --azul2:#0F5C8C;         /* azul de ação */
      --azul-claro:#EDF3F8;
      --dourado:#9A7B3F;       /* acento dourado, uso pontual */
      --dourado-claro:#F5EFE2;
      --verde:#2F6B4F; --verde-claro:#EAF3EE;
      --vermelho:#96372F; --vermelho-claro:#F8ECEA;
      --ambar:#8F6A24; --ambar-claro:#F7F0DF;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:var(--sans);background:var(--papel);color:var(--tinta);overflow-x:hidden;font-size:15px}
    input,textarea,button,select,a{font-family:inherit}
    h1,h2,h3,.serif{font-family:var(--serif)}
    ::-webkit-scrollbar{display:none}
    button{cursor:pointer;border:none;background:none;color:inherit}
    .card{background:var(--branco);border-radius:10px;border:1px solid var(--linha);margin-bottom:12px;overflow:hidden}
    .inp{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--linha);font-size:14px;color:var(--tinta);background:var(--branco);outline:none}
    .inp:focus{border-color:var(--azul2)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 16px;border-radius:8px;font-size:13.5px;font-weight:600;transition:opacity .15s;letter-spacing:.1px}
    .btn:active{opacity:.7}
    .btn-p{background:var(--azul);color:#FFF}
    .btn-s{background:var(--branco);color:var(--azul);border:1px solid var(--linha)}
    .btn-d{background:var(--vermelho-claro);color:var(--vermelho);border:1px solid #E9CFCB}
    .btn-g{background:var(--verde-claro);color:var(--verde);border:1px solid #CDE2D6}
    .chip{display:inline-flex;align-items:center;gap:4px;border-radius:99px;padding:2px 10px;font-size:11.5px;font-weight:600;white-space:nowrap;border:1px solid transparent}
    .page{max-width:700px;margin:0 auto;padding:16px 16px 92px}
    .nav{position:fixed;bottom:0;left:0;right:0;background:var(--branco);border-top:1px solid var(--linha);display:flex;justify-content:space-around;padding:5px 2px calc(5px + env(safe-area-inset-bottom));z-index:50;overflow-x:auto}
    .nav button{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9.5px;font-weight:600;color:var(--tinta3);padding:5px 7px;border-radius:8px;min-width:52px}
    .nav button.on{color:var(--azul)}
    .nav button.on::after{content:'';display:block;width:16px;height:2px;background:var(--dourado);border-radius:2px;margin-top:1px}
    @media(min-width:768px){
      .nav{top:0;bottom:auto;border-top:none;border-bottom:1px solid var(--linha);justify-content:center;gap:4px;padding:8px}
      .nav button{flex-direction:row;font-size:13px;padding:8px 14px;gap:7px}
      .nav button.on::after{display:none}
      .nav button.on{background:var(--azul-claro)}
      .page{padding-top:78px;max-width:860px}
    }
    .hdr{font-family:var(--serif);font-size:24px;font-weight:700;color:var(--azul);letter-spacing:.2px}
    .sub{font-size:13px;color:var(--tinta2);margin:3px 0 16px}
    .kpi{flex:1;min-width:140px;background:var(--branco);border-radius:10px;border:1px solid var(--linha);padding:14px 16px;position:relative}
    .kpi .v{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--tinta)}
    .kpi .l{font-size:11.5px;color:var(--tinta2);font-weight:600;margin-top:3px;line-height:1.35}
    .seg{display:flex;background:var(--linha2);border-radius:9px;padding:3px;gap:2px}
    .seg button{flex:1;padding:8px 6px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--tinta2);display:flex;align-items:center;justify-content:center;gap:5px}
    .seg button.on{background:var(--branco);color:var(--azul);box-shadow:0 1px 2px rgba(35,40,46,.08)}
    .modal-bg{position:fixed;inset:0;background:rgba(35,40,46,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center}
    @media(min-width:768px){.modal-bg{align-items:center}}
    .modal{background:var(--branco);border-radius:14px 14px 0 0;width:100%;max-width:580px;max-height:88vh;overflow-y:auto;padding:20px}
    @media(min-width:768px){.modal{border-radius:12px}}
    .lbl{font-size:12px;font-weight:600;color:var(--tinta2);margin:12px 0 5px;display:block;letter-spacing:.2px}
    .titulo-secao{font-family:var(--serif);font-size:16px;font-weight:700;color:var(--tinta)}
    .regra{border:none;border-top:1px solid var(--linha2);margin:10px 0}
    .infotip{position:relative;display:inline-flex;color:var(--tinta3);cursor:help;vertical-align:-3px}
    .infotip-pop{position:fixed;transform:translateX(-50%);background:var(--tinta);color:#FFF;border-radius:8px;padding:9px 12px;font-size:11.5px;font-weight:400;line-height:1.5;width:230px;z-index:9999;box-shadow:0 6px 18px rgba(0,0,0,.25);pointer-events:none}
    @media print{
      .nav,.no-print{display:none!important}
      .page{padding:0;max-width:100%}
      body{background:#FFF}
      .card{border:none}
    }
    /* Documento de leitura do púlpito: fonte grande, centralizado, linhas
       diferenciadas — pensado para ser impresso e levado à reunião. */
    .folha-leitura{max-width:620px;margin:0 auto}
    .folha-leitura .item-leitura{text-align:center;padding:14px 10px;border-bottom:1px solid var(--linha2);border-radius:8px}
    .folha-leitura .rotulo-leitura{font-size:11px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--tinta3);margin-bottom:7px}
    .folha-leitura .conteudo-leitura{font-family:var(--serif);font-size:21px;color:var(--tinta);line-height:1.45}
    @media print{
      .folha-leitura{max-width:100%}
      .folha-leitura .item-leitura{padding:13pt 6pt;border-bottom:1px solid #E5E2DB;-webkit-print-color-adjust:exact;print-color-adjust:exact}
      .folha-leitura .rotulo-leitura{font-size:9.5pt}
      .folha-leitura .conteudo-leitura{font-size:20pt}
      .folha-leitura .secao-titulo{font-size:12.5pt}
    }
  </style>
</head>
<body>
<div id="app"></div>
<script type="module" src="./src/app.js"></script>
</body>
</html>
