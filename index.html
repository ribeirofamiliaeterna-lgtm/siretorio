<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Siretório">
  <title>Siretório · Gestão da Ala</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F4FF;color:#1E293B;overflow-x:hidden}
    input,textarea,button,select,a{font-family:inherit}
    ::-webkit-scrollbar{display:none}
    button{cursor:pointer;border:none;background:none}
    .card{background:#FFF;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid #E2E8F0;margin-bottom:10px;overflow:hidden}
    .inp{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #CBD5E1;font-size:14px;color:#334155;background:#FFF;outline:none}
    .inp:focus{border-color:#2563EB}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:700;transition:opacity .15s}
    .btn:active{opacity:.7}
    .btn-p{background:#2563EB;color:#FFF}
    .btn-s{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
    .btn-d{background:#FEE2E2;color:#991B1B;border:1px solid #FECACA}
    .btn-g{background:#F0FDF4;color:#15803D;border:1px solid #BBF7D0}
    .chip{display:inline-block;border-radius:99px;padding:2px 9px;font-size:11px;font-weight:700;white-space:nowrap}
    .page{max-width:680px;margin:0 auto;padding:14px 14px 90px}
    .nav{position:fixed;bottom:0;left:0;right:0;background:#FFF;border-top:1px solid #E2E8F0;display:flex;justify-content:space-around;padding:6px 4px calc(6px + env(safe-area-inset-bottom));z-index:50;overflow-x:auto}
    .nav button{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:700;color:#94A3B8;padding:4px 8px;border-radius:10px}
    .nav button.on{color:#2563EB;background:#EFF6FF}
    .nav button span.ic{font-size:19px}
    @media(min-width:768px){
      .nav{top:0;bottom:auto;border-top:none;border-bottom:1px solid #E2E8F0;justify-content:center;gap:8px;padding:8px}
      .nav button{flex-direction:row;font-size:13px;padding:8px 14px}
      .page{padding-top:76px;max-width:840px}
    }
    .hdr{font-size:20px;font-weight:800;margin-bottom:2px}
    .sub{font-size:12px;color:#64748B;margin-bottom:14px}
    .kpi{flex:1;min-width:130px;background:#FFF;border-radius:14px;border:1px solid #E2E8F0;padding:14px}
    .kpi .v{font-size:24px;font-weight:800}
    .kpi .l{font-size:11px;color:#64748B;font-weight:600;margin-top:2px}
    .seg{display:flex;background:#E2E8F0;border-radius:10px;padding:3px;gap:2px}
    .seg button{flex:1;padding:7px 4px;border-radius:8px;font-size:12px;font-weight:700;color:#64748B}
    .seg button.on{background:#FFF;color:#1E293B;box-shadow:0 1px 3px rgba(0,0,0,.1)}
    .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center}
    @media(min-width:768px){.modal-bg{align-items:center}}
    .modal{background:#FFF;border-radius:18px 18px 0 0;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;padding:18px}
    @media(min-width:768px){.modal{border-radius:18px}}
    .lbl{font-size:12px;font-weight:700;color:#475569;margin:10px 0 4px;display:block}
    @media print{
      .nav,.no-print{display:none!important}
      .page{padding:0;max-width:100%}
      body{background:#FFF}
    }
  </style>
</head>
<body>
<div id="app"></div>
<script type="module" src="./src/app.js"></script>
</body>
</html>
