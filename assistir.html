<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Reunião Sacramental · Assistir</title>
  <style>
    :root{
      --serif:'Palatino Linotype','Palatino','Book Antiqua','URW Palladio L',Georgia,serif;
      --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
      --azul:#16436B; --azul-escuro:#0E2E4C; --dourado:#C9B37E;
      --tinta:#23282E; --tinta2:#5A6068; --tinta3:#8A9099;
      --linha:#E5E2DB; --papel:#FAF9F6;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:var(--sans);background:var(--papel);color:var(--tinta);min-height:100vh;display:flex;flex-direction:column;align-items:center}
    .topo{width:100%;display:flex;flex-direction:column;align-items:center;padding:34px 20px 0;text-align:center}
    .arco{position:relative;width:min(340px,86vw);border-radius:170px 170px 14px 14px;overflow:hidden;
      background:linear-gradient(168deg,#1C5380 0%,#16436B 46%,#0E2E4C 100%);
      padding:44px 26px 30px;color:#FFF;box-shadow:0 18px 44px rgba(14,46,76,.28)}
    .arco svg{display:block;margin:0 auto 4px}
    .igreja{font-family:var(--serif);font-size:11px;letter-spacing:2.6px;text-transform:uppercase;color:var(--dourado);line-height:1.7;margin-top:14px}
    .evento{font-family:var(--serif);font-size:26px;font-weight:700;letter-spacing:.4px;margin-top:10px}
    .ala{font-size:13px;color:#B9C8D6;margin-top:5px}
    .verso{font-family:var(--serif);font-style:italic;font-size:15.5px;color:var(--tinta2);text-align:center;line-height:1.65;max-width:340px;margin:26px 20px 4px}
    .ref{font-size:11px;font-style:normal;color:var(--tinta3);margin-top:5px;letter-spacing:.4px}
    .card{background:#FFF;border-radius:14px;border:1px solid var(--linha);padding:22px;width:100%;max-width:400px;margin:22px 20px 40px;box-shadow:0 2px 10px rgba(35,40,46,.05)}
    .inp{width:100%;padding:11px 12px;border-radius:9px;border:1px solid var(--linha);font-size:14px;color:var(--tinta);outline:none;font-family:inherit;background:#FFF}
    .inp:focus{border-color:var(--azul)}
    .btn{width:100%;padding:13px;border-radius:9px;font-size:14.5px;font-weight:600;border:none;cursor:pointer;font-family:inherit;letter-spacing:.2px}
  </style>
</head>
<body>
<div id="app" style="width:100%;display:flex;flex-direction:column;align-items:center">
  <div style="color:#8A9099;font-size:13px;padding:60px 0">Carregando…</div>
</div>
<script type="module">
import { h, render } from 'https://esm.sh/preact@10';
import { useState, useEffect } from 'https://esm.sh/preact@10/hooks';
import { html } from 'https://esm.sh/htm@3/preact';
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
import { SUPABASE_URL, SUPABASE_ANON_KEY } from './src/config.js';

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const slug = new URLSearchParams(location.search).get('ala');

// Vitral em arco: raios de luz sobre a mesa do sacramento (desenho próprio)
const Vitral = () => html`
  <svg width="120" height="96" viewBox="0 0 120 96" fill="none" aria-hidden="true">
    <g opacity=".9">
      <path d="M60 6 L60 34" stroke="#C9B37E" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M38 12 L48 36" stroke="#C9B37E" stroke-width="1.1" stroke-linecap="round" opacity=".7"/>
      <path d="M82 12 L72 36" stroke="#C9B37E" stroke-width="1.1" stroke-linecap="round" opacity=".7"/>
      <path d="M20 24 L38 42" stroke="#C9B37E" stroke-width=".9" stroke-linecap="round" opacity=".45"/>
      <path d="M100 24 L82 42" stroke="#C9B37E" stroke-width=".9" stroke-linecap="round" opacity=".45"/>
    </g>
    <ellipse cx="60" cy="78" rx="44" ry="5" fill="#FFFFFF" opacity=".16"/>
    <path d="M18 78 h84" stroke="#E9DEC2" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M24 78 v9 M96 78 v9" stroke="#E9DEC2" stroke-width="1.4" stroke-linecap="round" opacity=".8"/>
    <path d="M52 66 h16 M54 66 v-6 a6 6 0 0 1 12 0 v6" stroke="#E9DEC2" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M40 72 a5 3.4 0 0 0 10 0z" stroke="#E9DEC2" stroke-width="1.4" fill="none"/>
    <path d="M70 72 a5 3.4 0 0 0 10 0z" stroke="#E9DEC2" stroke-width="1.4" fill="none"/>
  </svg>`;

function App() {
  const [ala, setAla] = useState(undefined);
  const [trans, setTrans] = useState(undefined);
  const [nomes, setNomes] = useState(['']);
  const [fase, setFase] = useState('form'); // form | enviando | pronto
  const [erro, setErro] = useState('');

  useEffect(() => {
    (async () => {
      if (!slug) { setAla(null); return; }
      const { data: a } = await sb.from('alas').select('id, nome, slug').eq('slug', slug).maybeSingle();
      setAla(a || null);
      if (!a) return;
      const hoje = new Date(); hoje.setDate(hoje.getDate() + 7);
      const { data: t } = await sb.from('transmissoes').select('*').eq('ala_id', a.id)
        .lte('data', hoje.toISOString().slice(0, 10)).order('data', { ascending: false }).limit(1);
      setTrans(t?.[0] || null);
    })();
  }, []);

  const enviar = async e => {
    e.preventDefault();
    const validos = nomes.map(n => n.trim()).filter(Boolean);
    if (validos.length === 0) { setErro('Escreva pelo menos um nome.'); return; }
    setFase('enviando'); setErro('');
    const { error } = await sb.from('transmissao_participantes').insert(
      validos.map(nome => ({ transmissao_id: trans.id, ala_id: ala.id, nome_informado: nome })));
    if (error) { setErro('Não foi possível registrar. Tente novamente.'); setFase('form'); return; }
    setFase('pronto');
    setTimeout(() => { location.href = trans.url; }, 2200);
  };

  if (ala === undefined || (ala && trans === undefined))
    return html`<div style=${{ color: '#8A9099', fontSize: 13, padding: '60px 0' }}>Carregando…</div>`;
  if (!ala) return html`
    <div class="card" style=${{ textAlign: 'center', marginTop: 60, color: 'var(--tinta2)', fontSize: 13.5 }}>
      Ala não encontrada. Confira o link recebido com a liderança.
    </div>`;

  return html`
  <div class="topo">
    <div class="arco">
      <${Vitral} />
      <div class="igreja">A Igreja de Jesus Cristo<br/>dos Santos dos Últimos Dias</div>
      <div class="evento">Reunião Sacramental</div>
      <div class="ala">${ala.nome}</div>
    </div>
  </div>
  <div class="verso">
    “E tomou o pão, e tendo dado graças, partiu-o e deu-lho, dizendo: Isto é o meu corpo,
    que é dado por vós; fazei isto em memória de mim.”
    <div class="ref">LUCAS 22:19</div>
  </div>

  <div class="card">
    ${!trans ? html`
      <div style=${{ textAlign: 'center', fontSize: 13.5, color: 'var(--tinta2)', lineHeight: 1.65, padding: '6px 2px' }}>
        O link desta semana ainda não foi publicado pela liderança.<br/>
        Volte um pouco antes do horário da reunião.
      </div>` : fase === 'pronto' ? html`
      <div style=${{ textAlign: 'center', padding: '6px 2px' }}>
        <div style=${{ fontFamily: 'var(--serif)', fontSize: 17, color: 'var(--azul)', fontWeight: 700 }}>Bem-vindo(a) à reunião</div>
        <div style=${{ fontSize: 13, color: 'var(--tinta2)', marginTop: 6, lineHeight: 1.6 }}>
          Sua presença foi registrada com carinho.<br/>Abrindo a transmissão…
        </div>
        <a href=${trans.url} style=${{ color: 'var(--azul)', fontSize: 13, display: 'inline-block', marginTop: 10 }}>
          Clique aqui se não abrir sozinho</a>
      </div>` : html`
      <form onSubmit=${enviar}>
        <div style=${{ fontSize: 13.5, fontWeight: 600, color: 'var(--tinta)', marginBottom: 4 }}>
          Quem vai assistir com você?
        </div>
        <div style=${{ fontSize: 12, color: 'var(--tinta3)', marginBottom: 12 }}>
          Assim a ala sabe que você participou, mesmo de casa.
        </div>
        ${nomes.map((n, i) => html`
          <div key=${i} style=${{ display: 'flex', gap: 6, marginBottom: 8 }}>
            <input class="inp" placeholder=${i === 0 ? 'Seu nome completo' : 'Nome do participante'} value=${n}
              onInput=${e => setNomes(a => a.map((x, j) => j === i ? e.target.value : x))} />
            ${i > 0 && html`<button type="button" style=${{ border: 'none', background: 'none', color: '#96372F', fontSize: 17, cursor: 'pointer' }}
              onClick=${() => setNomes(a => a.filter((_, j) => j !== i))}>✕</button>`}
          </div>`)}
        <button type="button" style=${{ border: 'none', background: 'none', color: 'var(--azul)', fontSize: 13, fontWeight: 600, cursor: 'pointer', marginBottom: 14, padding: 0 }}
          onClick=${() => setNomes(a => [...a, ''])}>+ Adicionar participante</button>
        ${erro && html`<div style=${{ fontSize: 12, color: '#96372F', background: '#F8ECEA', padding: '8px 10px', borderRadius: 8, marginBottom: 10 }}>${erro}</div>`}
        <button class="btn" type="submit" disabled=${fase === 'enviando'}
          style=${{ background: 'var(--azul)', color: '#FFF', opacity: fase === 'enviando' ? .6 : 1 }}>
          ${fase === 'enviando' ? 'Registrando…' : 'Assistir à transmissão'}
        </button>
      </form>`}
  </div>`;
}
render(html`<${App}/>`, document.getElementById('app'));
</script>
</body>
</html>
