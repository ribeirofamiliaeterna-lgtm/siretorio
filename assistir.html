<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Assistir à Reunião Sacramental</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F4FF;color:#1E293B;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}
    .card{background:#FFF;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.08);padding:22px;width:100%;max-width:420px}
    .inp{width:100%;padding:11px 12px;border-radius:10px;border:1px solid #CBD5E1;font-size:14px;color:#334155;outline:none;font-family:inherit}
    .inp:focus{border-color:#2563EB}
    .btn{width:100%;padding:12px;border-radius:10px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit}
  </style>
</head>
<body>
<div id="app"><div style="color:#94A3B8;font-size:13px">Carregando…</div></div>
<script type="module">
import { h, render } from 'https://esm.sh/preact@10';
import { useState, useEffect } from 'https://esm.sh/preact@10/hooks';
import { html } from 'https://esm.sh/htm@3/preact';
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
import { SUPABASE_URL, SUPABASE_ANON_KEY } from './src/config.js';

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const slug = new URLSearchParams(location.search).get('ala');

function App() {
  const [ala, setAla] = useState(undefined);
  const [trans, setTrans] = useState(undefined);
  const [nomes, setNomes] = useState(['']);
  const [fase, setFase] = useState('form'); // form | enviando | pronto
  const [erro, setErro] = useState('');

  useEffect(() => {
    (async () => {
      if (!slug) { setAla(null); return; }
      const { data: a } = await sb.from('alas').select('id, nome, slug').eq('slug', slug).maybeSingle();
      setAla(a || null);
      if (!a) return;
      const hoje = new Date(); hoje.setDate(hoje.getDate() + 7);
      const { data: t } = await sb.from('transmissoes').select('*').eq('ala_id', a.id)
        .lte('data', hoje.toISOString().slice(0, 10)).order('data', { ascending: false }).limit(1);
      setTrans(t?.[0] || null);
    })();
  }, []);

  const enviar = async e => {
    e.preventDefault();
    const validos = nomes.map(n => n.trim()).filter(Boolean);
    if (validos.length === 0) { setErro('Informe pelo menos um nome.'); return; }
    setFase('enviando'); setErro('');
    const { error } = await sb.from('transmissao_participantes').insert(
      validos.map(nome => ({ transmissao_id: trans.id, ala_id: ala.id, nome_informado: nome })));
    if (error) { setErro('Não foi possível registrar. Tente novamente.'); setFase('form'); return; }
    setFase('pronto');
    setTimeout(() => { location.href = trans.url; }, 1800);
  };

  if (ala === undefined || (ala && trans === undefined)) return html`<div class="card">Carregando…</div>`;
  if (!ala) return html`<div class="card" style=${{ textAlign: 'center' }}>⚠️ Ala não encontrada. Confira o link recebido.</div>`;

  return html`
  <div class="card">
    <div style=${{ textAlign: 'center', marginBottom: 16 }}>
      <div style=${{ fontSize: 38 }}>📺</div>
      <div style=${{ fontSize: 19, fontWeight: 800, marginTop: 4 }}>${ala.nome}</div>
      <div style=${{ fontSize: 13, color: '#64748B', marginTop: 2 }}>Transmissão da Reunião Sacramental</div>
    </div>
    ${!trans ? html`
      <div style=${{ textAlign: 'center', fontSize: 13, color: '#92400E', background: '#FEF3C7', padding: 14, borderRadius: 10 }}>
        O link desta semana ainda não foi publicado.<br/>Volte mais tarde. 🙂
      </div>` : fase === 'pronto' ? html`
      <div style=${{ textAlign: 'center', fontSize: 14, color: '#065F46', background: '#D1FAE5', padding: 16, borderRadius: 10 }}>
        ✅ Registro feito! Redirecionando para a transmissão…<br/>
        <a href=${trans.url} style=${{ color: '#1D4ED8', fontSize: 13 }}>Clique aqui se não abrir sozinho</a>
      </div>` : html`
      <form onSubmit=${enviar}>
        <div style=${{ fontSize: 13, fontWeight: 700, color: '#475569', marginBottom: 8 }}>
          Quem vai assistir? Escreva o nome completo:
        </div>
        ${nomes.map((n, i) => html`
          <div key=${i} style=${{ display: 'flex', gap: 6, marginBottom: 8 }}>
            <input class="inp" placeholder=${i === 0 ? 'Seu nome completo' : 'Nome do participante'} value=${n}
              onInput=${e => setNomes(a => a.map((x, j) => j === i ? e.target.value : x))} />
            ${i > 0 && html`<button type="button" style=${{ border: 'none', background: 'none', color: '#DC2626', fontSize: 17, cursor: 'pointer' }}
              onClick=${() => setNomes(a => a.filter((_, j) => j !== i))}>✕</button>`}
          </div>`)}
        <button type="button" style=${{ border: 'none', background: 'none', color: '#1D4ED8', fontSize: 13, fontWeight: 700, cursor: 'pointer', marginBottom: 14 }}
          onClick=${() => setNomes(a => [...a, ''])}>+ Adicionar participante</button>
        ${erro && html`<div style=${{ fontSize: 12, color: '#991B1B', background: '#FEE2E2', padding: '8px 10px', borderRadius: 8, marginBottom: 10 }}>${erro}</div>`}
        <button class="btn" type="submit" disabled=${fase === 'enviando'}
          style=${{ background: '#DC2626', color: '#FFF', opacity: fase === 'enviando' ? .6 : 1 }}>
          ${fase === 'enviando' ? 'Registrando…' : '▶️ Assistir à transmissão'}
        </button>
      </form>`}
  </div>`;
}
render(html`<${App}/>`, document.getElementById('app'));
</script>
</body>
</html>
